{% extends 'blog/base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto mt-16 p-10 bg-white rounded-[2rem] shadow-sm border border-gray-100">
    <h2 class="text-4xl font-black text-slate-800 mb-8">
        {% if form.instance.pk %}Edit Your Post{% else %}Create a New Post{% endif %}
    </h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-8">
        {% csrf_token %}
        
        {{ form.as_p }}

        <div class="flex items-center space-x-4 pt-4">
            <button type="submit" class="bg-[#2563eb] text-white px-10 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md">
                Save & Publish
            </button>
            <a href="{% url 'home' %}" class="text-gray-400 font-bold hover:text-gray-600 transition">Cancel</a>
        </div>
    </form>
</div>

<style>
    /* Styling for the form labels that Django generates automatically */
    p label { @apply block text-sm font-bold text-slate-700 mb-2 mt-4; }
    input[type="file"] { @apply text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer; }
</style>
{% endblock %}
